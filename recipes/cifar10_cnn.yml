#
# PyTorch CNN baseline over CIFAR-10 — a teaching recipe (Stories H.f.1 / H.f.3).
# A `simple_cnn` with no Optuna study, so the model-swap diff against the sklearn /
# random recipes stays legible. The base uses a deliberately SMALL training budget
# (5 epochs): at that budget the more-expressive CNN *underperforms* the flattened-
# pixel sklearn MLP. The `well_trained` variant (40 epochs) scales the budget until
# the CNN overtakes it — the capacity-vs-budget story (see the README tutorial).
#
# Same DataRefinery binding as every CIFAR recipe here — across flavors only
# `plugin` + `Architecture` change.
schema_version: 1
plugin: pytorch
seed: 20260613

Data:
  recipe: recipes/cifar10-base.yaml

Architecture:
  type: simple_cnn
  num_classes: 10
  in_channels: 3

Loss:
  op: cross_entropy

Optimizer:
  op: adamw
  learning_rate: 0.001

Training:
  max_epochs: 5
  batch_size: 128
  device: cpu
  precision: fp32
  checkpoint_cadence: 1

Evaluation:
  splits: [val, test]
  primary_metric: accuracy
  metrics: [accuracy, macro_f1, confusion_matrix]
  calibration_bins: 10

overlays:
  # Capacity is latent until the training budget is scaled. The 5-epoch base CNN
  # loses to the flattened-pixel sklearn MLP; with 40 epochs it overtakes — a
  # legacy-vs-modern-model lesson in one `--overlay` flag:
  #   modelfoundry materialize recipes/cifar10_cnn.yml --overlay well_trained
  well_trained:
    Training:
      max_epochs: 40

  # A "proper" training regime (Story H.f.5): a cosine LR schedule + early stopping.
  # `well_trained` trains a fixed 40 epochs at a constant LR and reports the noisy
  # final-epoch model; `scheduled` anneals the LR and stops on a val_loss plateau,
  # keeping the budget adaptive:
  #   modelfoundry materialize recipes/cifar10_cnn.yml --overlay scheduled
  scheduled:
    Optimizer:
      schedule:
        op: cosine
        T_max: 40
    Training:
      max_epochs: 40
      early_stopping:
        monitor: val_loss
        mode: min
        patience: 5
