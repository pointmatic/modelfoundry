# =============================================================================
# CIFAR-10 / ResNet-20 — ModelFoundry deliverable recipe (Story C.r, FR-3/FR-22)
# =============================================================================
# A real-shape CIFAR-10 image classifier: ResNet-20 trained on a materialized
# DataRefinery DR-1 instance (1,700 train / 300 val / 1,000 test, balanced 10
# classes) with an Optuna TPE + median-pruning hyperparameter study, calibrated
# to run entirely on CPU.
#
# Run it (from the repo root, with the DR-1 instance materialized under ./data):
#
#     modelfoundry materialize recipes/cifar10_resnet20.yml --data ./data
#
# or via the library:
#
#     from modelfoundry import materialize
#     mi = materialize("recipes/cifar10_resnet20.yml", data="./data")
#     print(mi.summary["total_params"], mi.evaluation["test"]["accuracy"])
#
# -----------------------------------------------------------------------------
# Data binding (vendor-dep-spec § "Resolving a materialized instance")
# -----------------------------------------------------------------------------
# `Data.recipe` points at the *DataRefinery* recipe, not an instance path.
# ModelFoundry resolves the instance through DataRefinery's blessed
# `resolve_instance()` (re-hashing the recipe's declared inputs), so the source
# CIFAR-10 ImageFolder must be present on the resolving host. NEVER hand-build
# the `<recipe-hash16>/<input-hash16>/<seed>` path — a hand-rolled key silently
# breaks after any canonical-bytes change.
#
# -----------------------------------------------------------------------------
# CPU-budget calibration (MEASURED — Story C.r, C5)
# -----------------------------------------------------------------------------
# Measured on Apple-silicon CPU (`Training.device: cpu`) over the real DR-1
# train split (1,700 images), ResNet-20 (272,474 params):
#
#     ~7 s / epoch  @ batch_size 128   (≈ 13 steps/epoch)
#     ~10–12 s / epoch @ batch_size 32 (≈ 53 steps/epoch — more per-step overhead)
#     evaluation (val 300 + test 1,000): ~3 s
#
# With this recipe's budget (20 trials × up to 8 epochs/trial + 40 final epochs),
# the per-step cost fits a mainstream CPU, but the *total* study is long:
#
#     optimization (worst case, no pruning): 20 × 8 × ~8 s ≈ 21 min
#     median pruning + the early-stopping patience trim this materially in practice
#     final training (40 epochs, early-stops on val_accuracy): ≤ 40 × ~7 s ≈ 5 min
#
# If that overruns your budget, use the `cpu_budget` overlay (8 trials × 4
# epochs + 15 final epochs ≈ 5–7 min total), or switch `Optimization.sampler`
# to `random` for a cheaper, embarrassingly-shardable search (documented
# fallback — `random` needs no warm-up and is the recommended path when the TPE
# warm-up overhead isn't justified by the trial budget):
#
#     modelfoundry materialize recipes/cifar10_resnet20.yml --data ./data \
#         --overlay cpu_budget
#
# The downsized CI/e2e smoke lives at tests/fixtures/recipes/cifar10_resnet20.yml.
# -----------------------------------------------------------------------------
schema_version: 1
plugin: pytorch
seed: 20260613

Data:
  recipe: recipes/cifar10-base.yaml

Architecture:
  type: resnet20
  num_classes: 10
  in_channels: 3

Loss:
  op: cross_entropy

# Base optimizer: AdamW + reduce_on_plateau.
#
# The R5 "optimizer (AdamW / SGD+momentum)" and "schedule (reduce_on_plateau /
# cosine)" comparisons are expressed as `overlays:` (below), NOT as Optuna search
# dimensions. The flat search space can't carry op-conditional params: a single
# `Optimizer.schedule` block can't validate for both ops (cosine *requires*
# `T_max`, which reduce_on_plateau's extra="forbid" model rejects), and SGD's
# `momentum` breaks an AdamW trial the same way. Searching an `.op` choice would
# need a grouped/conditional search-space mechanism — a follow-up plugin story.
# Until then, op-choice is an overlay comparison (side-by-side materializations,
# full per-op params preserved); LR / weight_decay / batch_size / patience are
# the genuine Optuna search dimensions.
Optimizer:
  op: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  schedule:
    op: reduce_on_plateau
    monitor: val_loss

Training:
  max_epochs: 40
  batch_size: 128
  device: cpu          # CPU deliverable; canonical-bytes-participating (B.n)
  early_stopping:
    # val_loss is the one monitor the validator (check 6: Evaluation.metrics ∪
    # {train_loss, val_loss}) AND the trainer (per-epoch keys train_loss /
    # val_loss / val_accuracy) both recognize. The Optuna study optimizes
    # `accuracy` (→ val_accuracy, maximize) independently of this.
    monitor: val_loss
    mode: min
    patience: 10
  precision: fp32
  checkpoint_cadence: 1

Optimization:
  sampler: tpe         # `random` is the documented cheaper fallback (see header)
  pruner: median
  n_trials: 20
  n_jobs: 1            # locked to 1 — parallel trials break determinism (FR-25)
  baseline_trial: enqueue_recipe_defaults
  objective_metric: accuracy
  max_epochs_per_trial: 8
  search_space:
    Optimizer.learning_rate: {log_uniform: [1.0e-4, 1.0e-2]}
    Optimizer.weight_decay: {log_uniform: [1.0e-5, 1.0e-2]}
    Training.batch_size: {categorical: [32, 64, 128]}
    Training.early_stopping.patience: {int: [5, 15]}

Evaluation:
  splits: [val, test]
  primary_metric: accuracy
  metrics: [accuracy, macro_f1, confusion_matrix, calibration_curve]
  calibration_bins: 10

Visualizations:
  - {op: training_curves, mode: reporting}
  - {op: confusion_matrix, mode: reporting}

overlays:
  # plateau-vs-cosine schedule comparison. The overlay swaps the schedule op
  # cleanly: the base's `monitor` is a structural ScheduleSpec field (dropped
  # before the cosine param model sees it), and `T_max` matches `max_epochs`.
  cosine:
    Optimizer:
      schedule: {op: cosine, T_max: 40}

  # AdamW-vs-SGD+momentum optimizer comparison.
  sgd_momentum:
    Optimizer:
      op: sgd
      learning_rate: 0.01
      momentum: 0.9
      weight_decay: 0.0001

  # Quick CPU run: fewer trials, capped epochs (≈ 5–7 min total — see header).
  cpu_budget:
    Training:
      max_epochs: 15
    Optimization:
      n_trials: 8
      max_epochs_per_trial: 4
