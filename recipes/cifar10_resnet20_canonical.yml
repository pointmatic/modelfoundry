# =============================================================================
# CIFAR-10 / ResNet-20 — CANONICAL TRAINING REGIME (Story H.f.9)
# =============================================================================
# Memorializes the "rigorous regime" investigation that H.f.8 deferred. The H.f
# experiments trained ResNet-20 with AdamW lr 1e-3 + early stopping for ~17-40
# epochs and topped out ~0.65-0.68 test accuracy; the published CIFAR ResNet-20
# reaches ~91%. H.f.8 settled that the residual path is sound (it memorizes) and
# fixed a best-weights bug (v0.10.1). This recipe encodes the *canonical* regime
# (He et al. 2015, "Deep Residual Learning"), to test how far the regime alone
# closes the remaining gap.
#
# Regime vs the H.f default (recipes/cifar10_resnet20.yml):
#   - SGD + momentum 0.9 + weight_decay 1e-4 + Nesterov   (was AdamW lr 1e-3)
#   - LR 0.1, cosine anneal over the FULL budget          (was reduce_on_plateau)
#   - 160 epochs, NO early stopping (train the full schedule; the v0.10.1
#     best-weights fix still restores the best-val checkpoint at the end)
#   - crop + flip ONLY — binds the cifar10-base-full-cropflip.yaml instance
#     (no color_jitter; canonical CIFAR augmentation)
#   - no Optuna study (the regime is fixed, not searched)
#
# Compute + MEASURED result (Story H.f.9, MPS, seed 20260617, v0.10.2):
#   - Wall clock: ~1,560 s (~26 min) for the full 160 epochs on Apple-silicon MPS
#     (faster than the ~1 h extrapolation from H.f.6). CPU: ~5+ hours.
#   - Converged accuracy: test 0.7764 / val 0.7936 (final epoch 160). +0.10 over
#     the AdamW/early-stop baseline (resnet20 0.679) — the regime is the dominant
#     factor. Requires v0.10.2: under v0.10.1's unconditional best-weights restore
#     this no-early-stopping run reported 0.7312 (shipped the early min-val_loss
#     epoch); see Story H.f.10.
#
# Run (from the repo root, with the crop+flip full instance materialized; the
# DataRefinery cache root defaults to ./data):
#
#     modelfoundry materialize recipes/cifar10_resnet20_canonical.yml
#
# OPEN REFINEMENTS (deferred — see Story H.f.9):
#   - True 50k train + the OFFICIAL labeled 10k CIFAR-10 test split. This binds
#     the carved-28k-train / 16.7k-test full instance; the official 10k test set
#     is NOT on disk (the Kaggle `test/` is 300k unlabeled distractors), so a
#     true apples-to-the-paper number needs that sourced upstream (DataRefinery,
#     FR-6).
#   - The plugin has no multi-step LR decay op (FR-OPT-2 = reduce_on_plateau /
#     cosine / linear_warmup); cosine-over-the-full-budget is the canonical-
#     equivalent schedule used here.
# -----------------------------------------------------------------------------
schema_version: 1
plugin: pytorch
seed: 20260617

Data:
  recipe: recipes/cifar10-base-full-cropflip.yaml

Architecture:
  type: resnet20
  num_classes: 10
  in_channels: 3

Loss:
  op: cross_entropy

Optimizer:
  op: sgd
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 0.0001
  nesterov: true
  schedule:
    op: cosine
    T_max: 160

Training:
  max_epochs: 160
  batch_size: 128
  device: mps          # ~1 hour on Apple-silicon MPS; switch to cpu (~5+ h) only if needed
  checkpoint_cadence: 40
  # NO early_stopping: train the full cosine schedule. The v0.10.1 best-weights
  # fix restores the best-val-loss checkpoint into the evaluated/persisted model.

Evaluation:
  splits: [val, test]
  primary_metric: accuracy
  metrics: [accuracy, macro_f1, confusion_matrix, calibration_curve]

Visualizations:
  - {op: training_curves, mode: reporting}
  - {op: confusion_matrix, mode: reporting}
