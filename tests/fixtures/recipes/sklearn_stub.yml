# Minimal sklearn MLPClassifier baseline recipe.
schema_version: 1
plugin: sklearn
seed: 7
Data:
  recipe: dr_recipe.yml
Architecture:
  type: mlp_classifier
  hidden_layer_sizes: [64]
  max_iter: 50
Loss:
  op: cross_entropy
Optimizer:
  op: adamw
  learning_rate: 0.01
Training:
  max_epochs: 1
  batch_size: 8
  device: cpu
Evaluation:
  splits: [val]
  primary_metric: accuracy
  metrics: [accuracy, macro_f1, confusion_matrix]
