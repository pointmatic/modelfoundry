# check 6: early_stopping.monitor not produced
schema_version: 1
plugin: pytorch
seed: 7
Data:
  recipe: dr_recipe.yml
Architecture:
  type: resnet20
  num_classes: 3
  in_channels: 3
Loss:
  op: cross_entropy
Optimizer:
  op: adamw
  learning_rate: 0.01
Training:
  max_epochs: 2
  batch_size: 8
  device: cpu
  early_stopping:
    monitor: bogus_metric
    mode: min
    patience: 3
Evaluation:
  splits:
  - val
  primary_metric: accuracy
  metrics:
  - accuracy
  - macro_f1
  - confusion_matrix
