# check 7: search_space key is not a real recipe path
schema_version: 1
plugin: pytorch
seed: 7
Data:
  recipe: dr_recipe.yml
Architecture:
  type: resnet20
  num_classes: 3
  in_channels: 3
Loss:
  op: cross_entropy
Optimizer:
  op: adamw
  learning_rate: 0.01
Training:
  max_epochs: 2
  batch_size: 8
  device: cpu
Evaluation:
  splits:
  - val
  primary_metric: accuracy
  metrics:
  - accuracy
  - macro_f1
  - confusion_matrix
Optimization:
  sampler: tpe
  pruner: median
  n_trials: 2
  max_epochs_per_trial: 1
  search_space:
    Bogus.nonexistent_path:
      log_uniform:
      - 0.0001
      - 0.01
