# PyTorch recipe with an Optuna optimization stage (TPE + median pruning).
schema_version: 1
plugin: pytorch
seed: 7
Data:
  recipe: dr_recipe.yml
Architecture:
  type: resnet20
  num_classes: 3
  in_channels: 3
Loss:
  op: cross_entropy
Optimizer:
  op: adamw
  learning_rate: 0.01
Training:
  max_epochs: 2
  batch_size: 8
  num_workers: 0
  device: cpu
Optimization:
  sampler: tpe
  pruner: median
  n_trials: 4
  max_epochs_per_trial: 2
  search_space:
    Optimizer.learning_rate:
      log_uniform: [1.0e-4, 1.0e-2]
Evaluation:
  splits: [val]
  primary_metric: accuracy
  metrics: [accuracy, macro_f1, confusion_matrix]
