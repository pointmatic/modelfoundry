#
# Downsized C.r e2e fixture — the SAME ResNet-20 / CIFAR-10 vertical as the
# deliverable `recipes/cifar10_resnet20.yml`, shrunk to a CPU test budget:
# 2 Optuna trials × 1 epoch each + 2 final epochs (vs. the deliverable's full
# study). It binds the REAL DataRefinery DR-1 instance (1,700/300/1,000) via
# `recipes/cifar10-base.yaml`, so the architecture/summary/eval surfaces are
# identical to the deliverable — only the compute budget differs.
#
# Architecture is unchanged from the deliverable, so the torchinfo summary still
# pins ResNet-20's 272,474 params; that invariant is what the e2e test asserts.
schema_version: 1
plugin: pytorch
seed: 20260613

Data:
  # Resolved via DataRefinery's blessed `resolve_instance` (vendor-dep-spec
  # § "Resolving a materialized instance") — never a hand-built instance path.
  recipe: recipes/cifar10-base.yaml

Architecture:
  type: resnet20
  num_classes: 10
  in_channels: 3

Loss:
  op: cross_entropy

# Base optimizer: AdamW + reduce_on_plateau. The AdamW-vs-SGD+momentum and
# plateau-vs-cosine "comparisons" are `variants:` (below), not search dimensions:
# the flat Optuna search space can't carry op-conditional params (cosine's
# required `T_max` collides with plateau's extra="forbid"; SGD's `momentum`
# breaks AdamW). See the deliverable recipe header for the full rationale.
Optimizer:
  op: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  schedule:
    op: reduce_on_plateau
    monitor: val_loss

Training:
  max_epochs: 2
  batch_size: 128
  device: cpu
  early_stopping:
    monitor: val_loss   # the one monitor both validator check 6 and the trainer accept
    mode: min
    patience: 2
  precision: fp32
  checkpoint_cadence: 1

Optimization:
  sampler: tpe
  pruner: median
  n_trials: 2
  n_jobs: 1
  baseline_trial: enqueue_recipe_defaults
  objective_metric: accuracy
  max_epochs_per_trial: 1
  search_space:
    Optimizer.learning_rate: {log_uniform: [1.0e-4, 1.0e-2]}
    Optimizer.weight_decay: {log_uniform: [1.0e-5, 1.0e-2]}
    Training.batch_size: {categorical: [64, 128]}
    Training.early_stopping.patience: {int: [1, 3]}

Evaluation:
  splits: [val, test]
  primary_metric: accuracy
  metrics: [accuracy, macro_f1, confusion_matrix, calibration_curve]
  calibration_bins: 10

Visualizations:
  - {op: training_curves, mode: reporting}
  - {op: confusion_matrix, mode: reporting}

variants:
  # plateau-vs-cosine schedule comparison: overlay swaps the schedule op cleanly
  # (the base's `monitor` is a structural ScheduleSpec field, dropped before the
  # cosine param model sees it).
  cosine:
    Optimizer:
      schedule: {op: cosine, T_max: 2}
  # AdamW-vs-SGD+momentum optimizer comparison.
  sgd_momentum:
    Optimizer:
      op: sgd
      learning_rate: 0.01
      momentum: 0.9
      weight_decay: 0.0001
