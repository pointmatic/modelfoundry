#
# Dev-environment shell for pyve + micromamba. This file pins ONLY the Python
# interpreter and pip; it does NOT ship with the PyPI wheel. The authoritative,
# wheel-shipped dependency declaration lives in pyproject.toml ([project]
# dependencies + optional-dependencies). Keeping deps in one place (pyproject)
# avoids the conda/pip two-place drift the project-essentials warns about.
#
# After editing, run: pyve lock
# Install the package + deps into this env with: pyve run pip install -e ".[pytorch]"
name: modelfoundry
channels:
  - conda-forge
dependencies:
  - python=3.12.13
  - pip
